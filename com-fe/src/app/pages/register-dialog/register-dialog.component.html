<div class="dialog-card">
  <div class="dialog-header">
    <div class="title">THÊM TÀI KHOẢN MỚI</div>
  </div>
  <form [formGroup]="registerForm" (ngSubmit)="submit()">
    <div class="dialog-body">
      <div class="dialog-form-grid">
        <div class="dialog-form-group">
          <label>Họ và tên <span class="required">*</span></label>
          <input formControlName="fullName" placeholder="Nhập họ và tên" />
          <small class="field-error" *ngIf="fullNameControl?.touched && fullNameControl?.hasError('required')">Vui lòng nhập họ và tên</small>
        </div>
        <div class="dialog-form-group">
          <label>Tên đăng nhập <span class="required">*</span></label>
          <input formControlName="username" placeholder="Nhập username" />
          <small class="field-error" *ngIf="usernameControl?.touched && usernameControl?.hasError('required')">Vui lòng nhập username</small>
        </div>
        <div class="dialog-form-group">
          <label>Mật khẩu <span class="required">*</span></label>
          <input formControlName="password" type="password" placeholder="Nhập mật khẩu" />
          <small class="field-error" *ngIf="passwordControl?.touched && passwordControl?.hasError('required')">Vui lòng nhập mật khẩu</small>
          <small class="field-error" *ngIf="passwordControl?.touched && passwordControl?.hasError('minlength')">Mật khẩu tối thiểu 6 ký tự</small>
        </div>
        <div class="dialog-form-group">
          <label>Vai trò <span class="required">*</span></label>
          <select formControlName="role">
            <option value="SALE_PARENT">Sale cấp 1</option>
            <option value="SALE_CHILD">Sale cấp 2</option>
            <option value="CUSTOMER">Khách hàng</option>
          </select>
        </div>
        <div class="dialog-form-group full-width">
          <label>Sale quản lý <span style="font-weight: 400; color: #9ca3af;">(dành cho Sale cấp 2)</span></label>
          <input type="number" formControlName="parentId" placeholder="Chọn Sale quản lý" />
          <small class="field-error" *ngIf="parentIdControl?.touched && parentIdControl?.hasError('required')">Vui lòng chọn Sale quản lý</small>
          <small class="field-error" *ngIf="parentIdControl?.touched && parentIdControl?.hasError('min')">Parent ID phải lớn hơn 0</small>
        </div>
      </div>
      <p class="dialog-error">{{error}}</p>
    </div>
    <div class="dialog-actions">
      <button type="button" class="btn-secondary" (click)="close()">Hủy bỏ</button>
      <button type="submit" class="btn-primary">Lưu lại</button>
    </div>
  </form>
</div>
