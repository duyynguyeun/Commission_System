<div class="dialog-card">
  <div class="dialog-header">
    <div class="title">ĐĂNG NHẬP</div>
  </div>
  <div class="dialog-body">
    <div class="dialog-form-grid single-col">
      <div class="dialog-form-group">
        <label>Tên đăng nhập <span class="required">*</span></label>
        <input [(ngModel)]="username" placeholder="Nhập tên đăng nhập" />
      </div>
      <div class="dialog-form-group">
        <label>Mật khẩu <span class="required">*</span></label>
        <input [(ngModel)]="password" type="password" placeholder="Nhập mật khẩu" />
      </div>
    </div>
    <p class="dialog-error">{{error}}</p>
  </div>
  <div class="dialog-actions">
    <button class="btn-secondary" (click)="close()">Hủy bỏ</button>
    <button class="btn-primary" (click)="submit()">Đăng nhập</button>
  </div>
</div>
