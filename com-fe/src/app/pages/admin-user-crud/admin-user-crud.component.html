<section class="admin-crud-page">
  <div class="page-shell">
    <div class="page-header">
      <h1>Quản lý người dùng</h1>
      <button class="btn-add" type="button" (click)="toggleForm()"><i class='bx bx-plus'></i> Thêm người dùng</button>
    </div>

    <!-- FORM DIALOG -->
    <ng-template #userFormDialog>
      <div class="form-card">
        <div class="form-card-header">
          <h3>{{ isEditMode ? 'Cập nhật người dùng' : 'Thêm người dùng mới' }}</h3>
          <button class="btn-close-form" type="button" (click)="closeForm()"><i class='bx bx-x'></i></button>
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Loại tài khoản <span class="req">*</span></label>
            <select [(ngModel)]="form.role"><option value="CUSTOMER">CUSTOMER</option><option value="SALE_PARENT">SALE_PARENT</option><option value="SALE_CHILD">SALE_CHILD</option><option value="ADMIN">ADMIN</option></select>
          </div>
          <div class="form-group"><label>Tên đăng nhập <span class="req">*</span></label><input [(ngModel)]="form.username" placeholder="Nhập username" /></div>
          <div class="form-group"><label>Mật khẩu <span class="req">*</span></label><input [(ngModel)]="form.password" type="password" placeholder="Nhập mật khẩu" /></div>
          <div class="form-group"><label>Họ và tên <span class="req">*</span></label><input [(ngModel)]="form.fullName" placeholder="Nhập họ và tên" /></div>
          <div class="form-group" *ngIf="form.role === 'SALE_CHILD'">
            <label>Sale quản lý <span class="req">*</span></label>
            <select [(ngModel)]="form.parentId">
              <option [value]="null">-- Chọn Sale quản lý --</option>
              <option *ngFor="let p of parents" [value]="p.id">{{p.fullName}}</option>
            </select>
          </div>
          <div class="form-group" *ngIf="form.role === 'CUSTOMER'"><label>Ngày sinh <span class="req">*</span></label><input [(ngModel)]="form.dob" type="date" /></div>
          <div class="form-group full-width" *ngIf="form.role === 'CUSTOMER'"><label>Địa chỉ <span class="req">*</span></label><textarea [(ngModel)]="form.address" rows="3" placeholder="Nhập địa chỉ"></textarea></div>
        </div>
        <div class="form-footer">
          <div class="form-msg" *ngIf="message">{{ message }}</div>
          <div class="form-actions">
            <button class="btn-cancel" (click)="closeForm()">Hủy</button>
            <button class="btn-submit" [disabled]="saving" (click)="submit()">{{ saving ? 'Đang lưu...' : (isEditMode ? 'Cập nhật' : 'Thêm mới') }}</button>
          </div>
        </div>
      </div>
    </ng-template>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-top">
        <span class="record-count">{{ totalRecords }} người dùng</span>
        <div class="table-top-right">
          <select class="role-filter" [(ngModel)]="roleFilter" (change)="onSearch()">
            <option value="ALL">Tất cả vai trò</option><option value="CUSTOMER">CUSTOMER</option><option value="SALE_PARENT">SALE_PARENT</option><option value="SALE_CHILD">SALE_CHILD</option><option value="ADMIN">ADMIN</option>
          </select>
          <div class="search-box"><i class='bx bx-search'></i><input [(ngModel)]="searchTerm" placeholder="Tìm kiếm..." (input)="onSearch()" /></div>
        </div>
      </div>
      <div *ngIf="loading" class="loading-block"><i class='bx bx-loader-alt bx-spin'></i> Đang tải...</div>
      <div *ngIf="!loading">
        <ag-grid-angular class="ag-theme-alpine admin-grid" [style.width]="'100%'" [style.height]="gridHeight"
          [rowData]="filteredUsers" [columnDefs]="columnDefs" [pagination]="true" [paginationPageSize]="pageSize"
          [suppressPaginationPanel]="true" [rowHeight]="52" [headerHeight]="44" [suppressCellSelection]="true"
          (gridReady)="onGridReady($event)" (cellClicked)="onActionClick($event)"></ag-grid-angular>
        <div class="pagination-bar" *ngIf="totalPages > 1">
          <span class="pg-info"><b>{{ (currentPage-1)*pageSize+1 }}-{{ Math.min(currentPage*pageSize, totalRecords) }}</b> của <b>{{ totalRecords }}</b> kết quả</span>
          <div class="pg-controls">
            <button class="pg-btn nav-btn" [disabled]="currentPage===1" (click)="goToPage(1)"><i class='bx bx-chevrons-left'></i></button>
            <button class="pg-btn nav-btn" [disabled]="currentPage===1" (click)="goToPage(currentPage-1)"><i class='bx bx-chevron-left'></i></button>
            <ng-container *ngFor="let p of getPages()">
              <button *ngIf="p !== '...'" class="pg-btn" [class.active]="p===currentPage" (click)="goToPage(+p)">{{ p }}</button>
              <span *ngIf="p === '...'" class="pg-dots">...</span>
            </ng-container>
            <button class="pg-btn nav-btn" [disabled]="currentPage===totalPages" (click)="goToPage(currentPage+1)"><i class='bx bx-chevron-right'></i></button>
            <button class="pg-btn nav-btn" [disabled]="currentPage===totalPages" (click)="goToPage(totalPages)"><i class='bx bx-chevrons-right'></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" *ngIf="toastMessage" [class.toast-error]="toastType==='error'">
    <i class='bx' [ngClass]="toastType==='error' ? 'bx-error-circle' : 'bx-check-circle'"></i>
    {{ toastMessage }}
  </div>
</section>
