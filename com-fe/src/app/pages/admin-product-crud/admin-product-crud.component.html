<section class="admin-crud-page">
  <div class="page-shell">
    <div class="page-header">
      <h1>Quản lý sản phẩm</h1>
      <button class="btn-add" type="button" (click)="toggleForm()"><i class='bx bx-plus'></i> Thêm sản phẩm</button>
    </div>

    <!-- FORM -->
    <div class="form-card" *ngIf="showForm">
      <div class="form-card-header">
        <h3>{{ isEditMode ? 'Cập nhật sản phẩm' : 'Thêm sản phẩm mới' }}</h3>
        <button class="btn-close-form" type="button" (click)="closeForm()"><i class='bx bx-x'></i></button>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Tên sản phẩm <span class="req">*</span></label><input [(ngModel)]="form.name" placeholder="Nhập tên sản phẩm" /></div>
        <div class="form-group"><label>Giá <span class="req">*</span></label><input [(ngModel)]="form.price" type="number" min="0" placeholder="Nhập giá" /></div>
        <div class="form-group"><label>Tồn kho</label><input [(ngModel)]="form.stockQuantity" type="number" min="0" /></div>
        <div class="form-group"><label>URL hình ảnh</label><input [(ngModel)]="form.urlImage" placeholder="https://..." /></div>
        <div class="form-group full-width"><label>Mô tả</label><textarea [(ngModel)]="form.description" rows="3" placeholder="Nhập mô tả"></textarea></div>
      </div>
      <div class="form-footer">
        <div class="form-msg" *ngIf="message">{{ message }}</div>
        <div class="form-actions">
          <button class="btn-cancel" (click)="closeForm()">Hủy</button>
          <button class="btn-submit" [disabled]="saving" (click)="submit()">{{ saving ? 'Đang lưu...' : (isEditMode ? 'Cập nhật' : 'Thêm mới') }}</button>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-top">
        <span class="record-count">{{ totalRecords }} sản phẩm</span>
        <div class="search-box"><i class='bx bx-search'></i><input [(ngModel)]="searchTerm" placeholder="Tìm kiếm..." (input)="onSearch()" /></div>
      </div>
      <div *ngIf="loading" class="loading-block"><i class='bx bx-loader-alt bx-spin'></i> Đang tải...</div>
      <div *ngIf="!loading">
        <ag-grid-angular class="ag-theme-alpine admin-grid" [style.width]="'100%'" [style.height]="gridHeight"
          [rowData]="filteredProducts" [columnDefs]="columnDefs" [pagination]="true" [paginationPageSize]="pageSize"
          [suppressPaginationPanel]="true" [rowHeight]="52" [headerHeight]="44" [suppressCellSelection]="true"
          (gridReady)="onGridReady($event)" (cellClicked)="onActionClick($event)"></ag-grid-angular>
        <div class="pagination-bar" *ngIf="totalPages > 1">
          <span class="pg-info">{{ (currentPage-1)*pageSize+1 }}–{{ Math.min(currentPage*pageSize, totalRecords) }} của {{ totalRecords }} kết quả</span>
          <div class="pg-controls">
            <button class="pg-btn" [disabled]="currentPage===1" (click)="goToPage(currentPage-1)"><i class='bx bx-chevron-left'></i></button>
            <ng-container *ngFor="let p of getPages()">
              <button *ngIf="p !== '...'" class="pg-btn" [class.active]="p===currentPage" (click)="goToPage(+p)">{{ p }}</button>
              <span *ngIf="p === '...'" class="pg-dots">…</span>
            </ng-container>
            <button class="pg-btn" [disabled]="currentPage===totalPages" (click)="goToPage(currentPage+1)"><i class='bx bx-chevron-right'></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" *ngIf="toastMessage" [class.toast-error]="toastType==='error'">
    <i class='bx' [ngClass]="toastType==='error' ? 'bx-error-circle' : 'bx-check-circle'"></i>
    {{ toastMessage }}
  </div>
</section>
