<div class="hero">
  <div class="overlay"></div>

  <header class="topbar">
    <div class="brand-wrap">
      <div class="logo">CS</div>
      <div class="brand-text">
        <strong>Commission System</strong>
        <small>Affiliate and Revenue Platform</small>
      </div>
    </div>
    <div class="auth-info" *ngIf="auth.getAuth() as me">
      <span>{{me.username}}  {{me.role}}</span>
      <button class="ghost" (click)="logout()">Đăng xuất</button>
    </div>
    <div class="auth-buttons" *ngIf="!auth.getAuth()">
      <button class="btn-login" (click)="openLogin()">Đăng nhập</button>
      <button class="btn-register" (click)="openRegister()">Đăng ký</button>
    </div>
  </header>

  <section class="hero-content">
    <p class="sub">CHÀO MỪNG ĐẾN HỆ THỐNG COMMISSION</p>
    <h1>Quản Lý Affiliate<br/>Tối Ưu Doanh Thu và chi phí mua hàng</h1>
    <p class="desc">Đăng nhập hoặc đăng ký để bắt đầu quản lý hoa hồng, lịch sử bán và báo cáo doanh thu và mua hàng.</p>
  </section>
</div>
